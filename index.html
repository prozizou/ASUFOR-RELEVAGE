<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#F59E0B">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css?v=9.6">
    <title>Relevage</title>
</head>
<body>
<div id="app">
    <section id="login-section" class="login-container">
        <div class="logo-icon">💧</div>
        <h1 class="login-title">ASUFOR Diandioly</h1>
        <p class="login-subtitle">Relevage</p>
        
        <input type="number" id="agent-code" class="login-input" placeholder="Code agent" inputmode="numeric" maxlength="6" onkeydown="if(event.key==='Enter')login()">
        <button onclick="login()" id="login-btn" class="login-btn">ACCÉDER À LA TOURNÉE</button>
        <div id="login-error" class="login-error"></div>
    </section>

    <section id="main-section" class="hidden">
        <header class="header">
            <div style="display:flex;align-items:center;gap:12px;min-width:0;">
                <div id="avatar" class="avatar">A</div>
                <div class="agent-info" style="min-width:0;">
                    <h3 id="agent-name" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">Agent</h3>
                    <p id="agent-zone">Zone</p>
                </div>
            </div>
            <div class="header-right">
                <button class="btn-theme" onclick="toggleTheme()" title="Changer de thème">🌓</button>
                <span id="sync-indicator" class="sync-pending hidden"></span>
                <div class="online-dot" id="online-dot" title="En ligne"></div>
                <div class="counter-badge" id="count-done">0</div>
            </div>
        </header>

        <div class="progress-container">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-fill"></div>
            </div>
            <div class="progress-text">
                <span id="progress-label">0 / 0 relevés</span>
                <span id="progress-pct">0%</span>
            </div>
        </div>

        <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all" onclick="setFilter('all',this)">📋 Tous</button>
            <button class="filter-tab" data-filter="pending" onclick="setFilter('pending',this)">⏳ En attente</button>
            <button class="filter-tab" data-filter="done" onclick="setFilter('done',this)">✅ Relevés</button>
            <button class="filter-tab" data-filter="anomaly" onclick="setFilter('anomaly',this)">🎙️ Anomalies</button>
        </div>

        <div class="search-container">
            <input type="text" id="search" placeholder="🔍 Rechercher client, compteur..." oninput="applyFilters()">
        </div>

        <div id="list"></div>

        <div class="nav-buttons">
            <button class="nav-btn" onclick="navigateClient(-1)">◀ Précédent</button>
            <span id="client-position">- / -</span>
            <button class="nav-btn" onclick="navigateClient(1)">Suivant ▶</button>
        </div>

        <div class="footer">
            <button class="btn-report" onclick="showReport()">📋 RAPPORT</button>
            <button class="btn-logout" onclick="confirmLogout()" title="Se déconnecter">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
            </button>
        </div>
    </section>
</div>

<div id="camera-modal" class="hidden">
    <div id="camera-live-view">
        <video id="camera-video" autoplay playsinline></video>
        <div class="camera-blur-overlay"></div>
        <div class="camera-ui">
            <div class="meter-frame"></div>
            <div class="camera-instruction">Centrez le compteur d'eau ici</div>
        </div>
        <div class="camera-controls">
            <button class="btn-cam-close" onclick="stopCamera()">✖ Annuler</button>
            <button class="btn-cam-capture" onclick="captureImage()"></button>
            <div style="width: 80px;"></div>
        </div>
    </div>

    <div id="camera-preview-view" class="hidden">
        <img id="preview-img" src="" alt="Photo prise">
        <div class="preview-controls">
            <div class="ocr-box">
                <label>Index détecté par l'IA (Modifiable) :</label>
                <input type="number" id="ocr-input" class="login-input" style="width: 100%; margin: 8px 0; border-radius: 12px; padding: 12px; background: rgba(255,255,255,0.1); color: white;" step="0.1">
                <small id="ocr-status" style="color: var(--accent); display: block; min-height: 20px;">🔍 Analyse de l'image en cours...</small>
            </div>
            <div style="display: flex; gap: 10px; width: 100%; margin-top: 15px;">
                <button class="btn-modal secondary" onclick="retakePhoto()" style="background: rgba(255,255,255,0.2); color: white; border: none;">🔄 Reprendre</button>
                <button class="btn-modal primary" onclick="confirmPhotoAndIndex()" id="btn-confirm-photo">✅ Valider l'index</button>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>
<div id="modal-container"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script type="module" src="js/main.js?v=12"></script>

</body>
</html>
